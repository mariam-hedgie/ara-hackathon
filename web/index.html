<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Research Agent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel composer">
        <p class="eyebrow">PROMPT COMPOSER</p>
        <div class="panel-header">
          <div>
            <h1>Ask the agent</h1>
            <p id="status-line" class="status-pill">Ara bridge ready</p>
          </div>
        </div>

        <div class="prompt-examples">
          <button class="chip" data-prompt="Research lightweight wake-word detection for edge AI devices.">
            Research lightweight wake-word detection for edge AI devices.
          </button>
          <button class="chip" data-prompt="Compare on-device speech-to-text options for a hackathon MVP.">
            Compare on-device speech-to-text options for a hackathon MVP.
          </button>
          <button class="chip" data-prompt="Design a voice-first UX flow for follow-up research questions.">
            Design a voice-first UX flow for follow-up research questions.
          </button>
        </div>

        <label class="field">
          <span>Prompt</span>
          <textarea id="prompt-input" rows="7" placeholder="Ask a research question for your voice-activated agent."></textarea>
        </label>

        <div class="controls">
          <label class="file-picker">
            <input id="file-input" type="file" multiple />
            <span>Attach files</span>
          </label>
          <span class="hint">Text files are inlined into the Ara request for context.</span>
        </div>
        <ul id="attachment-list" class="attachment-list"></ul>

        <div class="controls">
          <button id="start-dictation" class="secondary">Start dictation</button>
          <button id="stop-dictation" class="secondary" disabled>Stop dictation</button>
          <button id="send-button" class="primary">Send to Ara</button>
        </div>
      </section>

      <section class="panel results">
        <div class="panel-header">
          <div>
            <p class="eyebrow">OUTPUT</p>
            <h2>Research response</h2>
          </div>
          <div class="controls compact">
            <button id="speak-button" class="secondary" disabled>Speak answer</button>
            <button id="stop-speaking" class="secondary" disabled>Stop speaking</button>
          </div>
        </div>

        <div class="meta">
          <div>
            <span class="meta-label">RUN</span>
            <span id="run-id">-</span>
          </div>
          <div>
            <span class="meta-label">STATE</span>
            <span id="run-state">-</span>
          </div>
        </div>

        <article id="output" class="markdown-output empty">
          Send a prompt to see a structured research response here.
        </article>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
  </html>
